<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — TechMatch</title>

  <link rel="stylesheet" href="../css/index.css" />
  <link rel="stylesheet" href="../css/admin_login.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap"
    rel="stylesheet" />
</head>

<body>

  <main class="admin-login-wrapper">

    <div class="admin-login-box">

      <div class="brand-section">
        <a href="../index.html" class="logo">Tech<span>Match</span></a>
        <div class="admin-badge">
          <i class="fa-solid fa-shield-halved"></i>
          <span>Admin Portal</span>
        </div>
      </div>

      <div class="login-header">
        <h1>Admin Access</h1>
        <p>Authorized personnel only. Enter your credentials to manage the TechMatch store.</p>
      </div>

      <div class="security-notice">
        <i class="fa-solid fa-lock"></i>
        <div>
          <strong>Secure Login</strong>
          <span>All activities are logged and monitored.</span>
        </div>
      </div>

      <form class="admin-form" action="admin.html" method="post">
        <div class="form-group">
          <label for="admin-id">Admin ID or Email</label>
          <div class="input-with-icon">
            <i class="fa-solid fa-user-shield"></i>
            <input type="text" id="admin-id" name="admin_id" placeholder="admin@techmatch.com" autocomplete="username"
              required minlength="3" />
          </div>
        </div>

        <div class="form-group">
          <label for="admin-password">Password</label>
          <div class="input-with-icon">
            <i class="fa-solid fa-key"></i>
            <input type="password" id="admin-password" name="password" placeholder="Enter your password"
              autocomplete="current-password" required minlength="4" />
          </div>
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" name="remember" />
            <span>Keep me signed in</span>
          </label>
        </div>

        <button type="submit" class="admin-login-btn">
          <i class="fa-solid fa-right-to-bracket"></i>
          Login to Dashboard
        </button>

        <div class="warning-box">
          <i class="fa-solid fa-triangle-exclamation"></i>
          <p>Unauthorized access attempts will be reported and may result in legal action.</p>
        </div>
      </form>

      <div class="customer-redirect">
        <p>Not an admin?</p>
        <a href="../index.html">
          <i class="fa-solid fa-arrow-left"></i>
          Back to Store
        </a>
      </div>

    </div>

  </main>

</body>

</html>
