<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - TechMatch</title>
  <link rel="stylesheet" href="../css/index.css">
<link rel="stylesheet" href="../css/login.css">
   
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">

</head>
<body>

  <header>
    <nav class="navbar">
      <div class="logo">TechMatch</div>

      <ul class="nav-links">
        <li><a href="../index.html">Home</a></li>
        <li><a href="../index.html#products">Products</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="login.html">Login</a></li>
      </ul>

      <a href="cart.html" class="cart-icon" aria-label="Shopping cart">
        <i class="fa-solid fa-cart-shopping"></i>
        <span class="cart-count">2</span>
      </a>
    </nav>
  </header>

  <main class="login-wrapper">
    <div class="login-box">
      <h1>Login</h1>
      <p>Sign in to your TechMatch account</p>

      <form class="login-form">
        <div>
          <label for="role">Login Type</label>
          <select id="role" name="role">
            <option value="customer">Customer</option>
            <option value="admin">Admin</option>
          </select>
        </div>

        <div>
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
            required
          />
        </div>

        <div>
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            required
          />
        </div>

        <button type="submit">Login</button>
      </form>

      <div class="login-links">
        <a href="../index.html">Back to Home</a>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-content">
      <p>&copy; 2026 TechMatch. All Rights Reserved.</p>
      <p>Email: support@techmatch.com | Phone: +966 500000000</p>
    </div>
  </footer>

</body>
</html>
