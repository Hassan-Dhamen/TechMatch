<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Profile - TechMatch</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../css/profile.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header>
  <nav class="navbar">
    <div class="logo">TechMatch</div>
  </nav>
</header>

<main class="profile-container">

  <h1>My Profile</h1>

  <div class="profile-grid">

    <!-- USER INFO -->
    <div class="profile-card">
      <h2>👤 Personal Info</h2>

      <p><strong>Name:</strong> Mohammed</p>
      <p><strong>Email:</strong> m@gmail.com</p>
      <p><strong>Phone:</strong> +966500000000</p>

      <button>Edit Profile</button>
    </div>

    <!-- ORDERS -->
    <div class="profile-card">
      <h2>🛒 My Orders</h2>

      <table>
        <tr>
          <th>ID</th>
          <th>Product</th>
          <th>Total</th>
          <th>Status</th>
        </tr>

        <tr>
          <td>#1001</td>
          <td>iPhone 15</td>
          <td>$999</td>
          <td class="done">Delivered</td>
        </tr>

        <tr>
          <td>#1002</td>
          <td>MacBook</td>
          <td>$1999</td>
          <td class="pending">Processing</td>
        </tr>

      </table>

    </div>

  </div>

</main>

</body>
</html>
